<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Comic_Web</title>
    <link rel="stylesheet" href="login.css" />
    <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <div class="login-container">
      <div class="login-card">
        <!-- Nút đóng (X) quay về trang chủ -->
        <a href="/index.html" class="close-btn" title="Quay về trang chủ">
          <i class="bi bi-x-lg"></i>
        </a>

        <div class="login-header">
          <img src="/img/logo.png" alt="Comic_Web Logo" class="logo-login" />
          <h2>Đăng nhập</h2>
          <p>Chào mừng bạn trở lại!</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="input-group">
            <label for="email">
              <i class="bi bi-envelope"></i> Email
            </label>
            <input
              type="email"
              id="email"
              placeholder="example@email.com"
              required
            />
            <span class="error-msg" id="emailError"></span>
          </div>

          <div class="input-group">
            <label for="password">
              <i class="bi bi-lock"></i> Mật khẩu
            </label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="toggle-password"
                id="togglePassword"
                aria-label="Hiển thị mật khẩu"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <span class="error-msg" id="passwordError"></span>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember" />
              <span>Ghi nhớ đăng nhập</span>
            </label>
            <a href="#" class="forgot-link">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-login">Đăng nhập</button>
        </form>

        <div class="register-link">
          Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>

        <div class="social-login">
          <p>Hoặc đăng nhập bằng</p>
          <div class="social-icons">
            <a href="#" class="social-btn google">
              <i class="bi bi-google"></i>
            </a>
            <a href="#" class="social-btn facebook">
              <i class="bi bi-facebook"></i>
            </a>
            <a href="#" class="social-btn github">
              <i class="bi bi-github"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
