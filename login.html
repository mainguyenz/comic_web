<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Comic_Web</title>
    <link rel="stylesheet" href="css/login.css" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <div class="login-container">
      <div class="login-card">
        <!-- Nút đóng (X) quay về trang chủ -->
        <a href="trangchu.html" class="close-btn" title="Quay về trang chủ">
          <i class="bi bi-x-lg"></i>
        </a>

        <div class="login-header">
          <img src="img/logo.png" alt="Comic_Web Logo" class="logo-login" />
          <h2>Đăng nhập</h2>
          <p>Chào mừng bạn trở lại!</p>
        </div>

        <form id="loginForm" novalidate>
          <!-- Email -->
          <div class="form-row" id="row-email">
            <label>
              <i class="bi bi-envelope"></i> Email
              <input
                type="email"
                id="email"
                placeholder="example@email.com"
                autocomplete="email"
              />
            </label>
            <small class="notification" id="emailMsg"></small>
          </div>

          <!-- Mật khẩu -->
          <div class="form-row" id="row-password">
            <label>
              <i class="bi bi-lock"></i> Mật khẩu
              <div class="password-wrapper">
                <input
                  type="password"
                  id="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  id="togglePassword"
                  aria-label="Hiển thị mật khẩu"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </label>
            <small class="notification" id="passwordMsg"></small>
          </div>

          <button type="submit" class="btn-login">Đăng nhập</button>
        </form>

        <div class="register-link">
          Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>

      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
